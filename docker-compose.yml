services:
  sms-dashboard:
    build: .
    container_name: sms-dashboard
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DB_BACKEND: ${DB_BACKEND:-mysql}
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?Set DASHBOARD_PASSWORD in .env}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:?Set WEBHOOK_TOKEN in .env}
      WEBHOOK_SIGNING_KEY: ${WEBHOOK_SIGNING_KEY:?Set WEBHOOK_SIGNING_KEY in .env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in .env}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sms_dashboard}
      MYSQL_USER: ${MYSQL_USER:-sms_dashboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${PUBLIC_PORT:-8787}:8787"
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sms-dashboard-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  mysql:
    image: mysql:8.4
    container_name: sms-dashboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sms_dashboard}
      MYSQL_USER: ${MYSQL_USER:-sms_dashboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema/mysql.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sms-dashboard-net

networks:
  sms-dashboard-net:
    name: sms-dashboard-net
    driver: bridge

volumes:
  mysql-data:
